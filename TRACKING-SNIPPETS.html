<!--
  ============================================================
  MASTERCLASS FORM → CLICKFUNNELS INTEGRATION
  ============================================================

  The current masterclass form on the proposal site uses a placeholder
  submit handler (shows success state, fires FB Pixel Lead event).

  Her real masterclass at tiffanysmasterclass.com is ClickFunnels-based.
  To wire the new form to her existing backend (preserving her email
  automation, webinar flow, lead nurture — everything):

  1. Open https://www.tiffanysmasterclass.com/webinar-registration in a
     desktop browser, right-click the registration form, choose "Inspect"

  2. Find the <form> tag and grab two things:
     a. The form's `action` URL (something like
        https://app.clickfunnels.com/forms/abc123/responses)
     b. The exact `name` attributes of each input field
        (ClickFunnels uses specific names like "userevents[email]")

  3. In masterclass.html, replace the current form action and field names
     with what was found in step 2.

  4. Remove the JavaScript submit handler at the bottom of masterclass.html
     OR keep it and let it intercept + POST to ClickFunnels via fetch().

  Easiest path:
  - Remove the JS handler entirely
  - Set <form action="..." method="POST"> to the ClickFunnels endpoint
  - Update each input's `name` attribute
  - ClickFunnels handles the redirect/thank-you flow on its end
  - The current FB Pixel Lead event needs to be fired before submit
    (use a regular submit handler that fires fbq then form.submit())

  Alternative if wanting to keep the inline success state:
  - Keep the JS handler
  - Inside the handler, POST data to ClickFunnels via fetch() before
    showing the success state
  - This gives full control over the post-submit experience while
    preserving ClickFunnels as the data destination
  ============================================================
-->
